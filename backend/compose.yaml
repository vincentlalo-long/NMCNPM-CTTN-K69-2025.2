services:
  mysql-db:
    image: mysql:8.0
    container_name: football-mysql-container
    restart: always

    environment:
      MYSQL_DATABASE: football_booking
      MYSQL_ROOT_PASSWORD: mixisql123@

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-pmixisql123@",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
