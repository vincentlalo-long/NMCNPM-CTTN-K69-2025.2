spring:
  application:
    name: football-system

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/football_booking?useUnicode=true&characterEncoding=UTF-8&createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:mixisql123@}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  docker:
    compose:
      enabled: true
      file: ./compose.yaml
      lifecycle-management: start_and_stop

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:seed.sql
      continue-on-error: false

server:
  port: 8080
  servlet:
    context-path: /api/v1

application:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}

  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:86400000}
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.jdbc.datasource.init: DEBUG
    org.springframework.web: INFO
    com.kstn.group4.backend: DEBUG
